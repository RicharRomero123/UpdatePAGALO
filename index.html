<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPA Monitor Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Fira Code', monospace; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .btn-primary { background-color: #238636; border: none; }
        .btn-primary:hover { background-color: #2ea043; }
        .btn-danger { background-color: #da3633; border: none; }
        .btn-warning { background-color: #d29922; color: black; border: none; font-weight: bold; }
        .status-badge { font-size: 0.9rem; padding: 5px 12px; border-radius: 20px; }
        #console-log { background-color: #010409; border: 1px solid #30363d; height: 350px; overflow-y: auto; padding: 15px; font-size: 0.85rem; color: #7ee787; }
        .ticket-row { border-bottom: 1px solid #30363d; padding: 8px 0; display: flex; justify-content: space-between;}
        input, select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; color-scheme: dark; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2 class="text-white">🤖 RPA MULTIPAGOS <span class="text-muted" style="font-size: 1rem;">v3.3 Web Control</span></h2>
        </div>
        <div class="col-md-4 text-end">
            <span id="bot-status" class="status-badge bg-secondary text-white">Verificando...</span>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card p-4 h-100">
                <h5 class="text-info mb-4">⚙️ Configuración de Consulta</h5>
                
                <div class="mb-3">
                    <label class="form-label">Fecha (Calendario)</label>
                    <input type="date" id="inputFecha" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Filtro</label>
                    <select id="inputFiltro" class="form-select">
                        <option value="01">Todos (01)</option>
                        <option value="02">Nro de Ticket (02)</option>
                        <option value="05">Tickets Rojos (05)</option>
                        <option value="06">En Proceso Online (06)</option>
                    </select>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button id="btnConsultar" onclick="consultarTickets()" class="btn btn-primary">
                        🔍 CONSULTAR API INTERNA
                    </button>
                    
                    <div class="row mt-2 g-2">
                        <div class="col-6">
                            <button id="btnProcesar" onclick="procesarTickets()" class="btn btn-warning w-100 d-none">
                                ⚙️ PROCESAR RPA
                            </button>
                        </div>
                        <div class="col-6">
                            <button id="btnEliminar" onclick="eliminarTickets()" class="btn btn-danger w-100 d-none">
                                🗑️ ELIMINAR 
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 h-100">
                <h5 class="text-success mb-3">🖥️ Consola de Ejecución</h5>
                <div id="console-log">
                    <div>[SYSTEM] Panel listo. Esperando acción del usuario...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="containerResultados" class="row mt-4 d-none">
        <div class="col-12">
            <div class="card p-4">
                <h5 class="text-warning">📋 Tickets Pendientes: <span id="ticketCount">0</span></h5>
                <div id="listaTickets" class="mt-3" style="max-height: 250px; overflow-y: auto;">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://unbased-pallidly-donn.ngrok-free.dev";
    let ticketsEnMemoria = []; 

    function writeLog(msg, type = 'info') {
        const consoleLog = document.getElementById('console-log');
        const color = type === 'error' ? '#f85149' : (type === 'success' ? '#3fb950' : '#7ee787');
        const time = new Date().toLocaleTimeString();
        consoleLog.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    async function checkStatus() {
        try {
            const res = await fetch(`${API_BASE}/api/status`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            const data = await res.json();
            const badge = document.getElementById('bot-status');
            badge.innerText = `ONLINE: ${data.status}`;
            badge.className = "status-badge bg-success text-white";
        } catch (e) {
            document.getElementById('bot-status').className = "status-badge bg-danger text-white";
            document.getElementById('bot-status').innerText = "OFFLINE";
            writeLog("Error de conexión con el servidor.", "error");
        }
    }

    async function consultarTickets() {
        const fecha = document.getElementById('inputFecha').value;
        const filtro = document.getElementById('inputFiltro').value;
        
        if(!fecha) return alert("Selecciona una fecha válida");

        writeLog(`Consultando fecha ${fecha} con filtro ${filtro}...`);
        document.getElementById('btnConsultar').disabled = true;

        try {
            const url = `${API_BASE}/api/consultar?fecha=${fecha}&filtro=${filtro}`;
            const res = await fetch(url, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            const data = await res.json();
            
            ticketsEnMemoria = data.tickets || [];
            document.getElementById('ticketCount').innerText = data.count;
            
            if(data.count > 0) {
                document.getElementById('containerResultados').classList.remove('d-none');
                document.getElementById('btnProcesar').classList.remove('d-none');
                document.getElementById('btnEliminar').classList.remove('d-none');
                writeLog(`✅ Se encontraron ${data.count} tickets.`, 'success');
                
                const lista = document.getElementById('listaTickets');
                lista.innerHTML = ticketsEnMemoria.slice(0, 15).map(t => 
                    `<div class="ticket-row">
                        <span>🎫 Ticket: <strong>${t.numeroTicket}</strong></span> 
                        <span>ID DB: ${t.id}</span>
                    </div>`
                ).join('');
                if(data.count > 15) lista.innerHTML += `<div class="text-center mt-2 text-muted">...y ${data.count - 15} más...</div>`;
            } else {
                writeLog("No hay tickets con esos criterios.", "info");
                document.getElementById('btnProcesar').classList.add('d-none');
                document.getElementById('btnEliminar').classList.add('d-none');
                document.getElementById('containerResultados').classList.add('d-none');
            }
        } catch (e) {
            writeLog("Error: " + e.message, "error");
        } finally {
            document.getElementById('btnConsultar').disabled = false;
        }
    }

    async function procesarTickets() {
        if(ticketsEnMemoria.length === 0) return;
        if(!confirm(`¿Estás seguro de PROCESAR ${ticketsEnMemoria.length} tickets?`)) return;

        const listaNumeros = ticketsEnMemoria.map(t => t.numeroTicket);
        writeLog(`🚀 Iniciando procesamiento de ${listaNumeros.length} tickets... (Ver consola de Python para detalle)`, 'info');
        
        document.getElementById('btnProcesar').disabled = true;
        document.getElementById('btnEliminar').disabled = true;

        try {
            const res = await fetch(`${API_BASE}/api/procesar`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ tickets: listaNumeros })
            });
            const result = await res.json();
            writeLog(`✅ PROCESAMIENTO FINALIZADO: ${result.mensaje}`, 'success');
            limpiarVista();
        } catch (e) {
            writeLog("Error al procesar: " + e.message, "error");
        }
    }

    async function eliminarTickets() {
        if(ticketsEnMemoria.length === 0) return;
        if(!confirm(`⚠️ ATENCIÓN: ¿Estás seguro de ELIMINAR DE LA BASE DE DATOS ${ticketsEnMemoria.length} tickets?`)) return;

        const listaIds = ticketsEnMemoria.map(t => t.id);
        writeLog(`🗑️ Iniciando eliminación de ${listaIds.length} tickets... (Ver consola de Python para detalle)`, 'error');
        
        document.getElementById('btnProcesar').disabled = true;
        document.getElementById('btnEliminar').disabled = true;

        try {
            const res = await fetch(`${API_BASE}/api/eliminar`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ ids: listaIds })
            });
            const result = await res.json();
            writeLog(`✅ ELIMINACIÓN FINALIZADA: ${result.mensaje}`, 'success');
            limpiarVista();
        } catch (e) {
            writeLog("Error al eliminar: " + e.message, "error");
        }
    }

    function limpiarVista() {
        ticketsEnMemoria = [];
        document.getElementById('btnProcesar').classList.add('d-none');
        document.getElementById('btnEliminar').classList.add('d-none');
        document.getElementById('btnProcesar').disabled = false;
        document.getElementById('btnEliminar').disabled = false;
        document.getElementById('ticketCount').innerText = "0";
        document.getElementById('listaTickets').innerHTML = "";
    }

    checkStatus();
    document.getElementById('inputFecha').valueAsDate = new Date();
</script>

</body>
</html>
